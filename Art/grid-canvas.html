<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas</title>
    <link rel="stylesheet" href="grid.css" />
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            padding: 20px;
        }
        
        .grid-cell:hover {
            filter: brightness(.75);
        }
        .grid-cell {
            border: 1px solid #cccccc;
        }
    </style>
</head>
<body>
    <h1>Grid Canvas</h1>
    <div id="grid"></div>

    <button>Print array</button>

    <script>
        function createGrid(rows, cols) {
            const container = document.querySelector('#grid');
            container.innerHTML = ''; // Clear existing content

            // Set container to grid layout
            container.style.display = 'grid';
            container.style.gridTemplateColumns = `repeat(${cols}, 16px)`;
            container.style.gap = '0px';

            // Initialize the 2D logic array
            // This maps the visual DOM to a data structure
            
            const gridState = Array(rows).fill(null).map(() => Array(cols).fill(0));
         
            for (let y = 0; y < rows; y++) {    //let vs var
                for (let x = 0; x < cols; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    
                    // Store coordinates in dataset for easy retrieval
                    // dataset property allows you to attach custom data to an HTML element, attributes that start with data-
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                
                    // Visual feedback and state update
                    cell.addEventListener('click', () => {
                        // Update the logic array (1 = occupied/clicked)
                        if (gridState[x][y] == 0) {
                            // Toggle visual state
                            cell.style.backgroundColor = 'black';
                            gridState[x][y] = 1;
                            console.log(`gridState[${x}][${y}] = 1;`);
                        }
                        else {
                            // Untoggle visual state
                            cell.style.backgroundColor = 'white';
                            gridState[x][y] = 0;
                            console.log(`gridState[${x}][${y}] = 0;`);
                        }
                    });

                    container.appendChild(cell);
                }
            }
            console.table(gridState); // Show the 2D array in console
            return gridState;
        }

        const myGameLogic = createGrid(16, 16);

        const btn = document.querySelector('button');

        btn.addEventListener('click', () => {
            let stringArrayX = new String('');
            let stringArrayY = new String('');
            for (let y = 0; y < 16; y++) { 
                for (let x = 0; x < 16; x++) { 
                    if(myGameLogic[x][y] == 1) {
                        stringArrayX = stringArrayX + `${x}, `;
                        stringArrayY = stringArrayY + `${y}, `;
                    }
                }
            }
            alert("X and Y locations in console");
            console.log("let drawingX = [" + stringArrayX + ']\n' + "let drawingY = [" + stringArrayY + ']');
        });
    </script>
</body>
</html
