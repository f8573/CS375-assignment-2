<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quizzard Adventure</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="game-container">

    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <h1>🧙 Quizzard Adventure</h1>
        <p>Embark on a journey of knowledge...</p>
        <button id="start-btn">Start Adventure</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        
        <!-- Story Text -->
        <div id="story-box">
            <p id="story-text">
                You enter a mysterious forest. A glowing door appears...
            </p>
        </div>

        <!-- Choices -->
        <div id="choices">
            <button class="choice-btn">Open the door</button>
            <button class="choice-btn">Walk away</button>
        </div>

        <!-- Quiz Section (hidden at first) -->
        <div id="quiz-box" class="hidden">
            <p id="question">What is 2 + 2?</p>
            <button class="answer-btn">3</button>
            <button class="answer-btn">4</button>
            <button class="answer-btn">5</button>
        </div>

        <!-- UI Info -->
        <div id="ui-bar">
            <span id="score">Score: 0</span>
            <button id="hint-btn">Hint</button>
        </div>

    </div>

    <!-- End Screen -->
    <div id="end-screen" class="screen">
        <h2>Adventure Complete!</h2>
        <p id="final-score">Score: 0</p>
        <button id="restart-btn">Play Again</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
